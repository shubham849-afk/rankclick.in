<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#grad1)"/>
  
  <!-- RC Text in center -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="-1">RC</text>
  
  <!-- Accent circle border -->
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
</svg>